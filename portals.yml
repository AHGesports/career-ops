# Portal Scanner Configuration
# Customized for: Arshia Hemati — Full-stack Engineer (.NET/Angular/Node/Python)
# Priority: DACH market first, then EU remote, then UK/US/CA/AU remote

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- Core role titles --
    - "Full Stack"
    - "Full-Stack"
    - "Fullstack"
    - "Backend"
    - "Back-End"
    - "Back End"
    - "Software Engineer"
    - "Software Developer"
    - "Web Developer"
    - "Web Engineer"
    - "Application Developer"
    - "Application Engineer"
    # -- Stack-specific --
    - ".NET"
    - "C#"
    - "Angular"
    - "Node.js"
    - "NodeJS"
    - "TypeScript"
    - "Python"
    - "ASP.NET"
    - "FastAPI"
    - "Express.js"
    # -- Applied AI & Automation (NOT ML scientist/researcher) --
    - "Applied AI"
    - "AI Engineer"
    - "AI Developer"
    - "Automation Engineer"
    - "Automation Developer"
    - "Browser Automation"
    - "Agentic"
    - "AI Agent"
    - "AI Application"
    - "LLM Engineer"
    - "AI Integration"
    # -- German keywords (DACH market) --
    - "Softwareentwickler"
    - "Software-Entwickler"
    - "Webentwickler"
    - "Web-Entwickler"
    - "Programmierer"
    - "Applikationsentwickler"
    - "Anwendungsentwickler"
    - "Vollstack"
    - "KI Entwickler"
    - "KI-Entwickler"
    # -- Broader engineering --
    - "API Engineer"
    - "API Developer"
    - "Integration Engineer"
    - "Systems Engineer"
  negative:
    # Only hard exclusions — keep it loose
    - "Junior"
    - "Intern"
    - "Internship"
    - "Praktikum"
    - "Praktikant"
    - "Werkstudent"
    - "Lehrling"
    - "Trainee"
    - "Staff"
    - "Staff Engineer"
    - "Lead"
    - "Lead Engineer"
    - "Principal"
    - "Head"
    - "Director"
    - "VP"
    - "CTO"
  seniority_boost:
    - "Senior"
    - "Mid"
    - "Experienced"

# -- Search queries --
# Priority 1: DACH job boards (Austrian & German market)
# Priority 2: EU remote boards
# Priority 3: Global remote boards

search_queries:

  # =============================================
  # PRIORITY 1: DACH MARKET (Austria & Germany)
  # =============================================

  # -- AMS (Austrian Public Employment Service) --
  # Browse URL: https://jobs.ams.at/public/emps/jobs?query=Softwareentwickler&location=Salzburg&locationId=TOWN_13582&vicinity=20
  # See data/portal-scraping-guide.md for full scraping instructions
  - name: "AMS — Softwareentwickler Salzburg"
    query: 'site:jobs.ams.at Softwareentwickler OR "Software Developer" OR "Full Stack" Salzburg'
    enabled: true

  # -- devjobs.at (Austrian dev-focused job board) --
  # Direct browse URL (sorted by date): https://en.devjobs.at/jobs/search?osmState=salzburg-at&sort=date
  - name: "devjobs.at — Full-stack / Backend"
    query: 'site:devjobs.at "Full Stack" OR "Backend" OR "Software Engineer" OR "Softwareentwickler" Salzburg OR Wien OR remote'
    enabled: true

  - name: "devjobs.at — .NET / Angular / Python"
    query: 'site:devjobs.at ".NET" OR "Angular" OR "C#" OR "TypeScript" OR "Python" OR "Node.js" Salzburg OR Wien OR remote'
    enabled: true

  - name: "devjobs.at — AI / Automation"
    query: 'site:devjobs.at "AI" OR "Automation" OR "KI" "Engineer" OR "Entwickler" Salzburg OR Wien OR remote'
    enabled: true

  # -- karriere.at (Austria's #1 job board) --
  - name: "karriere.at — Full-stack / Backend"
    query: 'site:karriere.at "Full Stack" OR "Backend" OR "Software Engineer" OR "Softwareentwickler" Salzburg OR Wien OR remote'
    enabled: true

  - name: "karriere.at — .NET / Angular"
    query: 'site:karriere.at ".NET" OR "Angular" OR "C#" OR "TypeScript" Salzburg OR Wien OR remote'
    enabled: true

  - name: "karriere.at — Python / Node.js"
    query: 'site:karriere.at "Python" OR "Node.js" OR "FastAPI" OR "Express" Salzburg OR Wien OR remote'
    enabled: true

  - name: "karriere.at — AI / Automation"
    query: 'site:karriere.at "AI" OR "Automation" OR "KI" "Engineer" OR "Entwickler" Salzburg OR Wien OR remote'
    enabled: true

  # -- metajob.at (Austrian meta-search aggregator) --
  # Direct browse URL (sorted by date): https://www.metajob.at/Software%20Developer-Salzburg%20(Bundesland)
  - name: "metajob.at — Full-stack / Backend"
    query: 'site:metajob.at "Full Stack" OR "Backend" OR "Software Engineer" OR "Softwareentwickler" Salzburg OR Wien OR remote'
    enabled: true

  - name: "metajob.at — .NET / Angular / Python"
    query: 'site:metajob.at ".NET" OR "Angular" OR "Python" OR "C#" OR "TypeScript" Salzburg OR Wien OR remote'
    enabled: true

  # -- StepStone.at --
  - name: "StepStone.at — Full-stack / Backend"
    query: 'site:stepstone.at "Full Stack" OR "Backend" OR "Software Engineer" OR "Softwareentwickler" Salzburg OR Wien OR remote'
    enabled: true

  - name: "StepStone.at — .NET / Angular / Python"
    query: 'site:stepstone.at ".NET" OR "Angular" OR "Python" OR "C#" Salzburg OR Wien OR remote'
    enabled: true

  # -- willhaben.at/jobs --
  - name: "willhaben — Software Engineer"
    query: 'site:willhaben.at/jobs "Software" OR "Entwickler" OR "Full Stack" OR "Backend" Salzburg OR Wien'
    enabled: true

  # -- kununu jobs --
  - name: "kununu — Software Engineer AT"
    query: 'site:kununu.com "Software Engineer" OR "Softwareentwickler" OR "Full Stack" Salzburg OR Wien'
    enabled: true

  # -- jobs.at --
  - name: "jobs.at — Software / .NET / Angular"
    query: 'site:jobs.at "Software" OR ".NET" OR "Angular" OR "Full Stack" Salzburg OR Wien OR remote'
    enabled: true

  # -- hokify (Austria) --
  - name: "hokify — Software Engineer AT"
    query: 'site:hokify.at "Software" OR "Entwickler" OR "Backend" OR "Full Stack" Salzburg OR Wien'
    enabled: true

  # -- German market (remote-friendly or near Salzburg) --
  - name: "StepStone.de — .NET / Angular remote"
    query: 'site:stepstone.de ".NET" OR "Angular" OR "Full Stack" remote OR "Home Office"'
    enabled: true

  - name: "Indeed.de — Software Engineer remote"
    query: 'site:de.indeed.com "Software Engineer" OR "Full Stack" OR "Backend" ".NET" OR "Angular" OR "Python" remote'
    enabled: true

  # -- XING (DACH professional network) --
  - name: "XING — Software Engineer AT"
    query: 'site:xing.com/jobs "Software Engineer" OR "Softwareentwickler" OR "Full Stack" Salzburg OR Wien OR remote Austria'
    enabled: true

  # -- LinkedIn (DACH-focused) --
  - name: "LinkedIn — Full-stack AT"
    query: 'site:linkedin.com/jobs "Full Stack" OR "Backend" OR "Software Engineer" ".NET" OR "Angular" OR "TypeScript" Austria OR Salzburg OR Wien remote'
    enabled: true

  # =============================================
  # PRIORITY 2: EU REMOTE
  # =============================================

  # -- Greenhouse (EU-friendly companies) --
  - name: "Greenhouse — Full-stack / Backend EU"
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Full Stack" OR "Backend" OR "Software Engineer" ".NET" OR "Angular" OR "Node.js" OR "Python" remote Europe OR EMEA'
    enabled: true

  - name: "Greenhouse — Applied AI / Automation"
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Applied AI" OR "AI Engineer" OR "Automation" OR "Agentic" remote Europe OR EMEA'
    enabled: true

  # -- Ashby --
  - name: "Ashby — Full-stack / Backend EU"
    query: 'site:jobs.ashbyhq.com "Full Stack" OR "Backend" OR "Software Engineer" ".NET" OR "Angular" OR "Node.js" OR "Python" remote Europe OR EMEA'
    enabled: true

  - name: "Ashby — Applied AI / Automation"
    query: 'site:jobs.ashbyhq.com "Applied AI" OR "AI Engineer" OR "Automation" OR "Agentic" OR "AI Agent" remote'
    enabled: true

  # -- Lever --
  - name: "Lever — Full-stack / Backend EU"
    query: 'site:jobs.lever.co "Full Stack" OR "Backend" OR "Software Engineer" ".NET" OR "Angular" OR "Python" remote Europe OR EMEA'
    enabled: true

  # -- EU remote boards --
  - name: "EU Remote Jobs — Software Engineer"
    query: 'site:euremotejobs.com "Software Engineer" OR "Full Stack" OR "Backend" OR ".NET" OR "Angular" OR "Python"'
    enabled: true

  - name: "Remotive — Software Engineer EU"
    query: 'site:remotive.com "Software Engineer" OR "Full Stack" OR "Backend" ".NET" OR "Angular" OR "Node.js" OR "Python" Europe'
    enabled: true

  - name: "WeWorkRemotely — Full-stack / Backend"
    query: 'site:weworkremotely.com "Full Stack" OR "Backend" OR "Software Engineer" ".NET" OR "Angular" OR "Node.js" OR "Python"'
    enabled: true

  - name: "RemoteOK — Software Engineer"
    query: 'site:remoteok.com "Full Stack" OR "Backend" OR "Software Engineer" ".NET" OR "Angular" OR "Python"'
    enabled: true

  - name: "Himalayas — Software Engineer EU"
    query: 'site:himalayas.app "Software Engineer" OR "Full Stack" OR "Backend" ".NET" OR "Angular" OR "Python" Europe'
    enabled: true

  # -- Welcome to the Jungle (strong in DACH/EU) --
  - name: "WTTJ — Software Engineer DACH"
    query: 'site:welcometothejungle.com Austria OR Germany OR Switzerland "Software Engineer" OR "Full Stack" OR "Backend" OR ".NET" OR "Angular"'
    enabled: true

  # =============================================
  # PRIORITY 3: GLOBAL REMOTE (UK/US/CA/AU only)
  # =============================================

  - name: "Greenhouse — Full-stack global remote"
    query: 'site:boards.greenhouse.io "Full Stack" OR "Backend" OR "Software Engineer" ".NET" OR "Angular" OR "Node" OR "Python" remote worldwide'
    enabled: false

  - name: "Ashby — Applied AI global remote"
    query: 'site:jobs.ashbyhq.com "Applied AI" OR "AI Agent" OR "Automation Engineer" OR "Agentic" remote worldwide'
    enabled: false

  - name: "YC Jobs — Full-stack / Applied AI"
    query: 'site:workatastartup.com "Full Stack" OR "Backend" OR "Applied AI" OR "Automation" ".NET" OR "Angular" OR "Python" remote'
    enabled: false

  - name: "HN Who's Hiring — Software Engineer remote"
    query: 'site:news.ycombinator.com "Full Stack" OR "Backend" OR ".NET" OR "Angular" OR "Python" remote'
    enabled: false

